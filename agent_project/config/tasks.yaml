# config/tasks.yaml
#
# Reference configuration for all tasks.
# Same note as agents.yaml — this is documentation / future YAML-driven setup.
#
# The {topic} and {output_file} placeholders would be interpolated at runtime
# via CrewAI's @task decorator pattern with a @CrewBase class.

research_task:
  description: >
    Conduct thorough research on: {topic}

    Steps:
    1. Break the topic into 3–5 focused sub-questions.
    2. Run DuckDuckGo searches for each sub-question.
    3. Collect and verify facts, numbers, model names, benchmarks, and dates.
    4. Cross-check surprising claims with a second search.
    5. Organise notes under clear Markdown headings.
    6. Save notes to: {output_file}

    Requirements:
    - At least 5 distinct sources with URLs.
    - Mini comparison table if the topic involves ranking items.
    - Flag unverified items with [UNVERIFIED].
  expected_output: >
    A well-structured Markdown research brief saved to disk, containing:
    an executive summary, numbered sections, a source list with URLs,
    caveats flagged [UNVERIFIED], and at least one comparison table.
  agent: researcher
  output_file: "output/research_notes.md"

write_task:
  description: >
    Using the research notes in context, write a final document on: {topic}

    Requirements:
    - Format  : {output_format}
    - Length  : ~{word_count} words (±10%)
    - Audience: software practitioners
    - Sections: Introduction, Key Findings, Comparison Table,
                Recommendations, Sources
    - No invented facts. [UNVERIFIED] items excluded or labelled.
    - Save to: {output_file}
  expected_output: >
    A polished Markdown document with introduction, comparison table,
    concrete recommendations, and source list. Saved to output_file.
  agent: writer
  context:
    - research_task
  output_file: "output/final_report.md"

review_task:
  description: >
    Review the draft document from context for:
    1. Factual accuracy vs research notes
    2. Completeness (all sections present)
    3. Clarity
    4. Table correctness
    5. Actionability of recommendations

    For each issue: LOCATION / ISSUE / FIX
    Provide overall quality score 1–10.
  expected_output: >
    Structured review with overall score, numbered issues with
    LOCATION/ISSUE/FIX fields, and APPROVED / NEEDS REVISION verdict.
  agent: reviewer
  context:
    - write_task
  output_file: "output/review_notes.md"
